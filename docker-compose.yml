services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: servicehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Mikeyjen314
    ports:
      - "5433:5432"

  web:
    build: .
    command: sh -c "sleep 10 && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db